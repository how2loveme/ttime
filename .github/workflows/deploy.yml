name: Deploy ttime

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Debug Secret Length
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
        run: |
          echo "USER length: ${#HARBOR_USER}"
          echo "PASS length: ${#HARBOR_PASS}"

      - name: Docker Login
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
        run: |
          echo "$HARBOR_PASS" | docker login harbor.softworksapp.cloud \
            -u "$HARBOR_USER" --password-stdin

      - name: Build Image
        run: |
          docker build -t harbor.softworksapp.cloud/vote-project/compose-vote:${{ steps.vars.outputs.tag }} .

      - name: Push Image
        run: |
          docker push harbor.softworksapp.cloud/vote-project/compose-vote:${{ steps.vars.outputs.tag }}

      - name: Helm Upgrade
        run: |
          helm upgrade --install prod-vote \
            oci://harbor.softworksapp.cloud/vote-project/compose-vote \
            --set image.tag=${{ steps.vars.outputs.tag }} \
            -n vote-system

      - name: Health Check
        run: |
          sleep 15
          curl -f https://ttime.softworksapp.cloud/ || (helm rollback prod-vote -n vote-system && exit 1)