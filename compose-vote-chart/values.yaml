web:
  image: harbor.softworksapp.cloud/ttime/repository:v2
  imagePullPolicy: Always # 로컬 테스트를 위해 변경
  port: 8000

postgres:
  image: postgres:15-alpine
  user: friday
  password: softworks
  db: compose_vote
  storageSize: 1Gi

# 관리자 계정 자동 생성 설정
superuser:
  username: friday
  email: friday@softworks.co.kr
  password: softworks

ingress:
  enabled: true # 로컬에선 false, 실서버에선 true로 덮어쓰기
  className: "nginx"
  host: "ttime.softworksapp.cloud"
  tls:
    enabled: true
    secretName: "ttime-cert"   # 인증서가 저장된 K8s Secret 이름
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
