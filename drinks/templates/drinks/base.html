<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}☕ 컴포즈 티타임 투표{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --cy: #FFD600; --cd: #1A1A1A; }
    body { background-color: #f8f4ee; }
    .navbar { background-color: var(--cd) !important; }
    .navbar-brand span { color: var(--cy); }
    .btn-compose { background-color: var(--cy); color: var(--cd); font-weight:700; border:none; }
    .btn-compose:hover { background-color: #e6c000; color: var(--cd); }
    .card { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .menu-card { cursor:pointer; transition:transform .15s, box-shadow .15s; }
    .menu-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.15); }
    .menu-card.selected { border:3px solid var(--cy) !important; background:#fffde7; }
    .progress-bar { background-color: var(--cy); }
    .badge-cat { background-color:var(--cy); color:var(--cd); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-dark px-3 py-2">
  <a class="navbar-brand fw-bold" href="/">☕ <span>컴포즈</span> 티타임 투표</a>
  <div>
    <a href="/menu/" class="btn btn-outline-light btn-sm me-2">
      <i class="bi bi-list-ul"></i> 전체메뉴
    </a>
    <a href="/admin/" class="btn btn-outline-warning btn-sm">
      <i class="bi bi-gear"></i> 관리자
    </a>
  </div>
</nav>
<div class="container py-4">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
<footer class="text-center text-muted py-3 mt-4" style="font-size:.8rem;">
  컴포즈커피 신도림점 티타임 투표 시스템
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
